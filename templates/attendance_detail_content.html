<div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
    <table class="w-full text-sm text-left text-gray-600 dark:text-gray-300">
        <thead class="text-xs text-gray-700 dark:text-gray-200 uppercase bg-gray-50 dark:bg-gray-700 sticky top-0 shadow-sm">
            <tr>
                <th class="py-3 px-5 font-semibold tracking-wider">Sl.No</th>
                <th class="py-3 px-5 font-semibold tracking-wider">Date</th>
                <th class="py-3 px-5 font-semibold tracking-wider">Slot</th>
                <th class="py-3 px-5 font-semibold tracking-wider">Timing</th>
                <th class="py-3 px-5 font-semibold tracking-wider">Status</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
            {% if details %}
                {% for detail in details %}
                <tr class="bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                    <td class="py-3 px-5 border-none">{{ detail.sl_no }}</td>
                    <td class="py-3 px-5 border-none font-medium text-gray-900 dark:text-white">{{ detail.date }}</td>
                    <td class="py-3 px-5 border-none">{{ detail.slot }}</td>
                    <td class="py-3 px-5 border-none font-mono text-xs">{{ detail.timing }}</td>
                    
                    <td class="py-3 px-5 border-none font-bold 
                        {% if detail.status == 'Absent' %}
                            text-red-500 dark:text-red-400
                        {% elif detail.status == 'On Duty' %}
                            text-yellow-600 dark:text-yellow-400
                        {% else %}
                            text-green-500 dark:text-green-400
                        {% endif %}
                    ">
                        {{ detail.status }}
                    </td>
                </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="5" class="py-8 px-5 text-center text-gray-500 dark:text-gray-400 italic">No detailed attendance data found for this course.</td>
                </tr>
            {% endif %}
        </tbody>
    </table>
</div>
