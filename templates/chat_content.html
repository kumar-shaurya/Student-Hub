<div id="chat-container" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 flex flex-col h-[calc(100vh-140px)] md:h-[calc(100vh-180px)] overflow-hidden">
    <!-- Chat Header -->
    <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-indigo-600 rounded-t-xl shrink-0">
        <div>
            <h3 class="font-bold text-white text-lg flex items-center">
                <i data-lucide="users" class="w-5 h-5 mr-2 opacity-80"></i>
                <span id="chat-room-title">Room Chat</span>
            </h3>
            <p class="text-xs text-indigo-100 mt-0.5" id="chat-room-subtitle">Connecting to roommates...</p>
        </div>
        <div class="flex items-center space-x-2 bg-indigo-500/30 px-3 py-1.5 rounded-full border border-indigo-400/30">
            <span class="h-2 w-2 rounded-full bg-green-400 animate-pulse"></span>
            <span class="text-xs font-bold text-white tracking-wide">LIVE</span>
        </div>
    </div>

    <!-- Message List -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 bg-gray-50 dark:bg-gray-900/50 scroll-smooth custom-scrollbar">
        <div class="flex flex-col items-center justify-center h-full text-gray-400 space-y-3">
            <i data-lucide="loader" class="animate-spin h-8 w-8 text-indigo-500"></i>
            <p class="text-sm font-medium italic">Fetching conversation...</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-3 md:p-4 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shrink-0">
        <!-- Selected File Indicator (Hidden by default) -->
        <div id="chat-file-indicator" class="hidden mb-2 mx-auto max-w-5xl">
            <div class="inline-flex items-center px-3 py-1.5 bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800 rounded-lg max-w-full">
                <i data-lucide="file" class="w-4 h-4 text-indigo-500 mr-2 shrink-0"></i>
                <span id="chat-file-name" class="text-sm text-indigo-700 dark:text-indigo-300 truncate max-w-[200px] md:max-w-[400px]">filename.pdf</span>
                <button id="chat-file-remove" class="ml-3 text-gray-400 hover:text-red-500 transition-colors shrink-0 p-1 rounded-md hover:bg-red-50 dark:hover:bg-red-900/20" title="Remove file">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div class="flex items-end space-x-2 max-w-5xl mx-auto">
            <div class="flex-1 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-2xl p-1.5 focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-indigo-500 shadow-sm transition-all flex items-end">
                
                <input type="file" id="chat-file-input" class="hidden" accept="image/*,.pdf,.doc,.docx,.txt">
                <button onclick="document.getElementById('chat-file-input').click()" 
                    class="p-2.5 mb-0.5 ml-0.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-100 dark:hover:bg-gray-600 rounded-xl transition-colors shrink-0"
                    title="Attach File">
                    <i data-lucide="paperclip" class="w-5 h-5"></i>
                </button>

                <textarea id="chat-input" rows="1" placeholder="Type a message to your roommates..." 
                    class="w-full bg-transparent border-none focus:ring-0 text-sm md:text-base resize-none dark:text-white max-h-32 py-3 px-3 custom-scrollbar"></textarea>
            </div>
            
            <button id="send-chat-btn" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white p-3.5 mb-0.5 rounded-2xl shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed shrink-0 flex items-center justify-center h-[52px] w-[52px]">
                <i data-lucide="send" class="w-5 h-5 ml-0.5"></i>
            </button>
        </div>
        <div class="max-w-5xl mx-auto px-2 mt-1 hidden md:block">
             <span class="text-[10px] text-gray-400 dark:text-gray-500 font-medium">Press <kbd class="px-1 py-0.5 bg-gray-100 dark:bg-gray-700 rounded text-gray-500 dark:text-gray-400">Shift</kbd> + <kbd class="px-1 py-0.5 bg-gray-100 dark:bg-gray-700 rounded text-gray-500 dark:text-gray-400">Enter</kbd> for new line</span>
        </div>
    </div>
</div>
<script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
    
    // Auto-resize textarea logic
    const tx = document.getElementById('chat-input');
    if(tx) {
        tx.setAttribute('style', 'height:' + (tx.scrollHeight) + 'px;overflow-y:hidden;');
        tx.addEventListener("input", OnInput, false);
    }
    function OnInput() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.scrollHeight > 128) {
            this.style.overflowY = 'auto';
        } else {
            this.style.overflowY = 'hidden';
        }
    }
</script>
