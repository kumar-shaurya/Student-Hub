<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="Hh2FfBaeUJfNsm2wMHU2LxQkJN5k0Thx0DMSVjsMvow" />
    <title>Student-Hub - Login</title>
    <meta name="description" content="Student-Hub is a modern, fast, and responsive client for Student-Hub Student Portal for Chennai Campus. Access your attendance, marks, timetable, and calculate attendance requirements with a better UI/UX.">
    <meta name="keywords" content="Student-Hub, Student-Hub Login, Vellore Institute of Technology Chennai, Student Portal, Attendance Calculator, Student-Hub, Timetable, Better Student-Hub">
    <meta name="author" content="Student-Hub Team">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://student-hub.onrender.com/"> <meta property="og:title" content="Student-Hub - The Better Student-Hub Experience">
    <meta property="og:description" content="A faster, cleaner way to check your Student-Hub attendance, marks, and schedule. Includes a built-in attendance calculator.">
    <meta property="og:image" content="{{ url_for('static', filename='icon-512.png') }}">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://student-hub.onrender.com/"> <meta property="twitter:title" content="Student-Hub - Student-Hub but Cooler">
    <meta property="twitter:description" content="Login to Student-Hub for a modern dashboard, dark mode, and instant attendance insights.">
    <meta property="twitter:image" content="{{ url_for('static', filename='icon-512.png') }}">
    
    <meta name="theme-color" content="#4f46e5">
    
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    
    <script src="{{ url_for('static', filename='tailwind.js') }}"></script>
    <script>
        tailwind.config = { darkMode: 'media' } 
    </script>
    
    <script src="{{ url_for('static', filename='lucide.js') }}"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center min-h-screen p-4 transition-colors duration-200">
    <div class="w-full max-w-6xl mx-auto">
        
        <div id="loadingContainer" class="text-center p-8">
            <i data-lucide="loader" class="animate-spin w-10 h-10 text-indigo-600 dark:text-indigo-400 mx-auto"></i>
            <p class="mt-4 text-gray-600 dark:text-gray-400">Checking for a saved session...</p>
        </div>

        <div id="loginContainer" class="hidden w-full max-w-md mx-auto bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 transition-all duration-300">
            <h1 class="text-3xl font-bold text-center text-gray-900 dark:text-white mb-2">Student-Hub Login</h1>
            <p class="text-center text-gray-500 dark:text-gray-400 mb-8">Enter your credentials to begin.</p>
            
            <form id="loginForm" class="space-y-6">
                <input type="hidden" id="sessionId">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 pl-3 flex items-center">
                            <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="text" id="username" name="username" required class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Registration No.">
                    </div>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 pl-3 flex items-center">
                            <i data-lucide="lock" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" required class="block w-full pl-10 pr-10 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Your Password">
                        
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors focus:outline-none">
                            <i data-lucide="eye" id="icon-eye" class="w-5 h-5"></i>
                            <i data-lucide="eye-off" id="icon-eye-off" class="w-5 h-5 hidden"></i>
                        </button>
                    </div>
                </div>
                
                <div id="captchaGroup" class="hidden space-y-3">
                     <label for="captcha" class="block text-sm font-medium text-gray-700 dark:text-gray-300">CAPTCHA</label>
                     <div id="captchaImageContainer" class="flex items-center justify-center bg-gray-100 dark:bg-gray-900 rounded-lg h-20 p-2 border border-gray-200 dark:border-gray-600 overflow-hidden">
                        </div>
                     <input type="text" id="captcha" name="captcha" class="block w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent uppercase tracking-widest transition-colors" placeholder="ENTER TEXT" autocomplete="off">
                </div>
                
                <div class="pt-2">
                    <button type="submit" id="loginButton" class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                        <span id="loginButtonText">Login</span>
                        <i data-lucide="loader" id="loginButtonSpinner" class="animate-spin ml-2 w-4 h-4 hidden"></i>
                    </button>
                </div>
            </form>
            <div id="statusMessage" class="mt-6 text-center text-sm font-medium min-h-[20px]"></div>
        </div>
        
    </div>

    <script type="module" src="{{ url_for('static', filename='login.js') }}"></script>
    <script>
        // Initialize Lucide icons immediately for the loading spinner
        if(typeof lucide !== 'undefined') lucide.createIcons();
    </script>
</body>
</html>
